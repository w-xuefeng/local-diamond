<!DOCTYPE html>
<html lang="{{lang}}" data-theme="auto">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{t.title}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    >
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* ── Theme tokens ── */
      :root {
        --accent-1: #06b6d4;
        --accent-2: #8b5cf6;
        --accent-gradient: linear-gradient(135deg, #06b6d4, #8b5cf6);
        --accent-glow: rgba(6, 182, 212, 0.15);
        --danger: #f43f5e;
        --danger-hover: #e11d48;
        --success: #10b981;
        --radius-sm: 8px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Dark theme */
      [data-theme="dark"] {
        --bg-deep: #06080f;
        --bg-base: #0c1021;
        --bg-surface: rgba(17, 24, 48, 0.7);
        --bg-surface-hover: rgba(25, 35, 65, 0.8);
        --bg-surface-solid: #111830;
        --bg-input: rgba(8, 12, 28, 0.8);
        --text-primary: #e8ecf4;
        --text-secondary: #8892a8;
        --text-muted: #5a6480;
        --border: rgba(99, 115, 155, 0.15);
        --border-focus: rgba(6, 182, 212, 0.5);
        --shadow-card:
          0 4px 24px rgba(0, 0, 0, 0.25), 0 1px 4px rgba(0, 0, 0, 0.15);
        --sidebar-bg: rgba(10, 14, 30, 0.85);
        --modal-backdrop: rgba(4, 6, 14, 0.8);
        --skeleton-from: rgba(99, 115, 155, 0.08);
        --skeleton-to: rgba(99, 115, 155, 0.18);
      }

      /* Light theme */
      [data-theme="light"] {
        --bg-deep: #f0f2f5;
        --bg-base: #ffffff;
        --bg-surface: rgba(255, 255, 255, 0.85);
        --bg-surface-hover: rgba(243, 245, 249, 0.9);
        --bg-surface-solid: #ffffff;
        --bg-input: #f5f7fa;
        --text-primary: #1a1d26;
        --text-secondary: #5f6980;
        --text-muted: #9aa3b8;
        --border: rgba(0, 0, 0, 0.08);
        --border-focus: rgba(6, 182, 212, 0.5);
        --shadow-card:
          0 1px 8px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
        --sidebar-bg: rgba(255, 255, 255, 0.9);
        --modal-backdrop: rgba(0, 0, 0, 0.4);
        --skeleton-from: rgba(0, 0, 0, 0.04);
        --skeleton-to: rgba(0, 0, 0, 0.08);
      }

      /* Auto: system preference */
      @media (prefers-color-scheme: dark) {
        [data-theme="auto"] {
          --bg-deep: #06080f;
          --bg-base: #0c1021;
          --bg-surface: rgba(17, 24, 48, 0.7);
          --bg-surface-hover: rgba(25, 35, 65, 0.8);
          --bg-surface-solid: #111830;
          --bg-input: rgba(8, 12, 28, 0.8);
          --text-primary: #e8ecf4;
          --text-secondary: #8892a8;
          --text-muted: #5a6480;
          --border: rgba(99, 115, 155, 0.15);
          --border-focus: rgba(6, 182, 212, 0.5);
          --shadow-card:
            0 4px 24px rgba(0, 0, 0, 0.25), 0 1px 4px rgba(0, 0, 0, 0.15);
          --sidebar-bg: rgba(10, 14, 30, 0.85);
          --modal-backdrop: rgba(4, 6, 14, 0.8);
          --skeleton-from: rgba(99, 115, 155, 0.08);
          --skeleton-to: rgba(99, 115, 155, 0.18);
        }
      }
      @media (prefers-color-scheme: light) {
        [data-theme="auto"] {
          --bg-deep: #f0f2f5;
          --bg-base: #ffffff;
          --bg-surface: rgba(255, 255, 255, 0.85);
          --bg-surface-hover: rgba(243, 245, 249, 0.9);
          --bg-surface-solid: #ffffff;
          --bg-input: #f5f7fa;
          --text-primary: #1a1d26;
          --text-secondary: #5f6980;
          --text-muted: #9aa3b8;
          --border: rgba(0, 0, 0, 0.08);
          --border-focus: rgba(6, 182, 212, 0.5);
          --shadow-card:
            0 1px 8px rgba(0, 0, 0, 0.06), 0 1px 3px rgba(0, 0, 0, 0.04);
          --sidebar-bg: rgba(255, 255, 255, 0.9);
          --modal-backdrop: rgba(0, 0, 0, 0.4);
          --skeleton-from: rgba(0, 0, 0, 0.04);
          --skeleton-to: rgba(0, 0, 0, 0.08);
        }
      }

      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Small screen layout (default) ── */
      .app {
        max-width: 720px;
        margin: 0 auto;
        padding: 1.5rem 1rem 4rem;
      }
      .sidebar {
        display: contents;
      }
      .main-content {
        display: contents;
      }

      /* ── Header ── */
      .header {
        text-align: center;
        padding: 2rem 0 1.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }
      .header-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .header-icon {
        width: 40px;
        height: 40px;
        background: var(--accent-gradient);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 24px rgba(6, 182, 212, 0.18);
        animation: float 3s ease-in-out infinite;
        flex-shrink: 0;
      }
      @keyframes float {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-4px);
        }
      }
      .header-icon svg {
        width: 22px;
        height: 22px;
        fill: white;
      }
      .header h1 {
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .header p {
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      /* ── Theme switcher ── */
      .theme-switcher {
        display: flex;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 99px;
        padding: 3px;
        gap: 2px;
      }
      .theme-btn {
        padding: 5px 10px;
        border-radius: 99px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-size: 0.7rem;
        font-weight: 500;
        cursor: pointer;
        transition: all var(--transition);
        font-family: inherit;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .theme-btn svg {
        width: 12px;
        height: 12px;
      }
      .theme-btn.active {
        background: var(--accent-gradient);
        color: white;
      }
      .theme-btn:not(.active):hover {
        color: var(--text-primary);
      }

      /* ── Cards ── */
      .card {
        background: var(--bg-surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 1.25rem;
        margin-bottom: 1rem;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: var(--shadow-card);
        animation: cardIn 0.4s ease-out both;
      }
      .card:nth-child(2) {
        animation-delay: 0.05s;
      }
      .card:nth-child(3) {
        animation-delay: 0.1s;
      }
      .card:nth-child(4) {
        animation-delay: 0.15s;
      }
      .card:nth-child(5) {
        animation-delay: 0.2s;
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .card-title {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-secondary);
        margin-bottom: 0.85rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .card-title svg {
        width: 15px;
        height: 15px;
        opacity: 0.6;
      }
      .badge {
        font-size: 0.65rem;
        padding: 2px 7px;
        border-radius: 99px;
        background: var(--accent-glow);
        color: var(--accent-1);
        font-weight: 500;
      }

      /* ── Inputs ── */
      input[type="text"], input[type="password"] {
        width: 100%;
        padding: 0.6rem 0.75rem;
        background: var(--bg-input);
        color: var(--text-primary);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-family: inherit;
        font-size: 0.8rem;
        transition:
          border-color var(--transition),
          box-shadow var(--transition);
        outline: none;
      }
      input:focus {
        border-color: var(--border-focus);
        box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
      }
      input::placeholder {
        color: var(--text-muted);
      }
      .form-group {
        margin-bottom: 0.75rem;
      }
      .form-label {
        display: block;
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 0.3rem;
        letter-spacing: 0.02em;
      }
      .input-row {
        display: flex;
        gap: 0.6rem;
        align-items: flex-end;
      }
      .input-row .form-group {
        flex: 1;
        margin-bottom: 0;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      @media (max-width: 480px) {
        .form-grid {
          grid-template-columns: 1fr;
        }
      }

      /* ── Buttons ── */
      button {
        font-family: inherit;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.55rem 1rem;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition);
        outline: none;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }
      button svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .btn-accent {
        background: var(--accent-gradient);
        color: white;
        box-shadow: 0 2px 10px rgba(6, 182, 212, 0.18);
      }
      .btn-accent:hover {
        box-shadow: 0 4px 18px rgba(6, 182, 212, 0.3);
        transform: translateY(-1px);
      }
      .btn-accent:active {
        transform: translateY(0) scale(0.98);
      }
      .btn-accent:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .btn-ghost {
        background: var(--bg-input);
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        background: var(--bg-surface-hover);
        color: var(--text-primary);
      }
      .btn-danger-sm {
        background: rgba(244, 63, 94, 0.1);
        color: var(--danger);
        padding: 0.35rem 0.6rem;
        font-size: 0.7rem;
        border: 1px solid rgba(244, 63, 94, 0.15);
      }
      .btn-danger-sm:hover {
        background: rgba(244, 63, 94, 0.2);
      }
      .btn-icon {
        padding: 0.4rem;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--text-secondary);
      }
      .btn-icon:hover {
        background: var(--bg-surface-hover);
        color: var(--text-primary);
      }

      /* ── Data management ── */
      .data-actions {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .data-btn {
        flex: 1;
        min-width: 120px;
        padding: 0.85rem;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: all var(--transition);
        text-align: left;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .data-btn:hover {
        border-color: var(--border-focus);
        background: var(--bg-surface-hover);
      }
      .data-btn-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .data-btn-icon svg {
        width: 16px;
        height: 16px;
      }
      .data-btn-icon.export {
        background: rgba(16, 185, 129, 0.1);
        color: var(--success);
      }
      .data-btn-icon.import {
        background: rgba(139, 92, 246, 0.1);
        color: var(--accent-2);
      }
      .data-btn-text {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-primary);
      }
      .data-btn-desc {
        font-size: 0.65rem;
        color: var(--text-muted);
        margin-top: 1px;
      }

      /* ── Key list & search ── */
      .search-input {
        margin-bottom: 0.75rem;
        position: relative;
      }
      .search-input input {
        padding-left: 2rem;
      }
      .search-input svg {
        position: absolute;
        left: 0.65rem;
        top: 50%;
        transform: translateY(-50%);
        width: 13px;
        height: 13px;
        color: var(--text-muted);
        pointer-events: none;
      }
      .key-list {
        list-style: none;
      }
      .key-list:has(.empty-state) {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .key-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.6rem 0.7rem;
        border-radius: var(--radius-sm);
        transition: background var(--transition);
        margin-bottom: 2px;
      }
      .key-item:hover {
        background: var(--bg-surface-hover);
      }
      .key-name {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 60%;
      }
      .key-actions {
        display: flex;
        gap: 0.3rem;
        flex-shrink: 0;
      }

      /* ── Empty & Loading states ── */
      .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        color: var(--text-muted);
        font-size: 0.8rem;
      }
      .empty-state svg {
        width: 48px;
        height: 48px;
        margin-bottom: 0.75rem;
        opacity: 0.25;
      }
      .empty-state p {
        margin-top: 0.3rem;
      }
      .loading-state {
        padding: 1rem 0;
      }
      .skeleton {
        height: 44px;
        border-radius: var(--radius-sm);
        margin-bottom: 6px;
        background: linear-gradient(
          90deg,
          var(--skeleton-from) 25%,
          var(--skeleton-to) 50%,
          var(--skeleton-from) 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      /* ── Toast ── */
      .toast-container {
        position: fixed;
        top: 1.25rem;
        right: 1.25rem;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        pointer-events: none;
      }
      .toast {
        padding: 0.65rem 1rem;
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        font-weight: 500;
        pointer-events: auto;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        animation: toastIn 0.3s ease-out;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        max-width: 320px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }
      .toast.success {
        background: rgba(16, 185, 129, 0.15);
        color: var(--success);
        border: 1px solid rgba(16, 185, 129, 0.25);
      }
      .toast.error {
        background: rgba(244, 63, 94, 0.15);
        color: var(--danger);
        border: 1px solid rgba(244, 63, 94, 0.25);
      }
      .toast.leaving {
        animation: toastOut 0.25s ease-in forwards;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes toastOut {
        from {
          opacity: 1;
          transform: translateX(0);
        }
        to {
          opacity: 0;
          transform: translateX(30px);
        }
      }

      /* ── Modal ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: var(--modal-backdrop);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
        z-index: 2000;
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }
      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
      .modal {
        background: var(--bg-surface-solid);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.75rem;
        width: 92%;
        max-width: 460px;
        transform: scale(0.95) translateY(8px);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
      }
      .modal-overlay.active .modal {
        transform: scale(1) translateY(0);
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }
      .modal-header h2 {
        font-size: 0.95rem;
        font-weight: 600;
        font-family: "JetBrains Mono", monospace;
        color: var(--accent-1);
      }
      .modal-value {
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0.85rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        word-break: break-all;
        color: var(--text-primary);
        margin-top: 0.4rem;
      }
      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.4rem;
        margin-top: 1.25rem;
      }
      .modal-label {
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .spinner {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ═══════════════════════════════════════════
         ── DASHBOARD LAYOUT (≥1000px) ──
         ═══════════════════════════════════════════ */
      @media (min-width: 1001px) {
        .app {
          max-width: none;
          padding: 0;
          display: block;
        }
        .header {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          z-index: 100;
          flex-direction: row;
          justify-content: space-between;
          text-align: left;
          padding: 0.85rem 2rem;
          border-bottom: 1px solid var(--border);
          background: var(--sidebar-bg);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
        }
        .header-left {
          display: flex;
          align-items: center;
          gap: 0.75rem;
        }
        .header p {
          margin: 0;
        }

        .sidebar {
          display: flex;
          flex-direction: column;
          gap: 0;
          padding: 1.5rem 1.75rem;
          position: fixed;
          top: 88px;
          left: 0;
          bottom: 0;
          width: 500px;
          border-right: 1px solid var(--border);
          background: var(--sidebar-bg);
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(16px);
          overflow-y: auto;
        }
        .sidebar .card {
          background: transparent;
          border: none;
          box-shadow: none;
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
          padding: 0;
          margin-bottom: 1.5rem;
          border-radius: 0;
        }
        .sidebar .card + .card {
          border-top: 1px solid var(--border);
          padding-top: 1.25rem;
        }

        .main-content {
          display: flex;
          flex-direction: column;
          position: fixed;
          top: 88px;
          left: 500px;
          right: 0;
          bottom: 0;
          padding: 1.25rem 2rem;
          overflow-y: auto;
        }
        .main-content .card {
          flex: 1;
          display: flex;
          flex-direction: column;
          margin-bottom: 0;
        }
        .main-content .key-list {
          flex: 1;
          overflow-y: auto;
        }
        .main-content .card-header-row {
          position: sticky;
          top: 0;
          background: var(--bg-surface-solid);
          z-index: 1;
          padding-bottom: 0.75rem;
        }
      }

      /* Desktop-only: wider key names */
      @media (min-width: 1001px) {
        .key-name {
          max-width: 70%;
        }
        .form-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="toast-container" id="toastContainer"></div>
    <div class="app">
      <header class="header">
        <div class="header-left">
          <div class="header-row">
            <div class="header-icon">
              <svg viewBox="0 0 24 24">
                <path
                  d="M12 2L2 9l10 13L22 9 12 2zm0 2.5L19 9l-7 9.2L5 9l7-4.5z"
                />
              </svg>
            </div>
            <div>
              <h1>{{t.title}}</h1>
              <p>{{t.headerDesc}}</p>
            </div>
          </div>
        </div>
        <div class="theme-switcher">
          <button
            class="theme-btn"
            data-theme-val="light"
            onclick="setTheme('light')"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="5" />
              <path
                d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
              />
            </svg>
            Light
          </button>
          <button
            class="theme-btn"
            data-theme-val="dark"
            onclick="setTheme('dark')"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
            </svg>
            Dark
          </button>
          <button
            class="theme-btn"
            data-theme-val="auto"
            onclick="setTheme('auto')"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M12 2a10 10 0 000 20V2z" />
            </svg>
            Auto
          </button>
        </div>
      </header>

      <div class="sidebar">
        <div class="card">
          <div class="card-title">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            {{t.masterKeyTitle}}
          </div>
          <p
            style="color: var(--text-muted); font-size: 0.72rem; margin-bottom: 0.75rem; line-height: 1.5"
          >
            {{t.masterKeyDesc}} {{t.masterKeyGenDesc}}
          </p>
          <div class="input-row">
            <div class="form-group">
              <div style="position: relative">
                <input
                  type="password"
                  id="masterKey"
                  placeholder="{{t.masterKeyPlaceholder}}"
                  oninput="checkMasterKeyInput()"
                />
                <button
                  type="button"
                  class="btn-icon"
                  id="toggleKeyBtn"
                  onclick="toggleKeyVisibility()"
                  style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%)"
                >
                  <svg
                    id="eyeIcon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    width="14"
                    height="14"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
            </div>
            <button
              id="autoGenerateBtn"
              class="btn-ghost"
              style="white-space: nowrap; flex-shrink: 0"
              onclick="generateKey()"
            >
              {{t.autoGenerateBtn}}
            </button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 5v14M5 12h14" />
            </svg>
            {{t.addSecretTitle}}
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">{{t.secretKeyLabel}}</label>
              <input
                type="text"
                id="newKey"
                placeholder="{{t.secretKeyPlaceholder}}"
              />
            </div>
            <div class="form-group">
              <label class="form-label">{{t.secretValueLabel}}</label>
              <input
                type="password"
                id="newValue"
                placeholder="{{t.secretValuePlaceholder}}"
              />
            </div>
          </div>
          <button
            id="storeBtn"
            class="btn-accent"
            onclick="addSecret()"
            style="margin-top: 0.35rem"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"
              />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
            {{t.storeSecretBtn}}
          </button>
        </div>

        <div class="card">
          <div class="card-title">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            {{t.dataManagementTitle}}
          </div>
          <div class="data-actions">
            <div class="data-btn" onclick="exportDataFile()">
              <div class="data-btn-icon export">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                  <polyline points="7 10 12 15 17 10" />
                  <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
              </div>
              <div>
                <div class="data-btn-text">{{t.exportBtn}}</div>
                <div class="data-btn-desc">{{t.exportDesc}}</div>
              </div>
            </div>
            <div
              class="data-btn"
              onclick="document.getElementById('importFile').click()"
            >
              <div class="data-btn-icon import">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" />
                  <polyline points="17 8 12 3 7 8" />
                  <line x1="12" y1="3" x2="12" y2="15" />
                </svg>
              </div>
              <div>
                <div class="data-btn-text">{{t.importBtn}}</div>
                <div class="data-btn-desc">{{t.importDesc}}</div>
              </div>
            </div>
            <input
              type="file"
              id="importFile"
              accept=".json"
              style="display: none"
              onchange="importDataFile(event)"
            />
          </div>
        </div>
      </div>

      <div class="main-content">
        <div class="card">
          <div
            class="card-header-row"
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem"
          >
            <div class="card-title" style="margin-bottom: 0">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="2" y="6" width="20" height="12" rx="2" />
                <path d="M12 12h.01" />
              </svg>
              {{t.storedSecretsTitle}}
              <span class="badge" id="keyCount">0</span>
            </div>
            <button
              class="btn-icon"
              onclick="loadKeys()"
              id="refreshBtn"
              title="{{t.refreshBtn}}"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                width="15"
                height="15"
              >
                <polyline points="23 4 23 10 17 10" />
                <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" />
              </svg>
            </button>
          </div>
          <div class="search-input">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="{{t.searchPlaceholder}}"
              oninput="filterKeys()"
            />
          </div>
          <ul id="keyList" class="key-list">
            <li class="loading-state" id="initialLoading">
              <div class="skeleton"></div>
              <div class="skeleton" style="width: 85%"></div>
              <div class="skeleton" style="width: 70%"></div>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- Decrypt Modal -->
    <div
      class="modal-overlay"
      id="decryptModal"
      onclick="if(event.target===this)closeModal()"
    >
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalKeyName">Key</h2>
          <button class="btn-icon" onclick="closeModal()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="16"
              height="16"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div
          id="modalLoading"
          style="display: none; text-align: center; padding: 1.5rem 0"
        >
          <span class="spinner"></span>
        </div>
        <div id="modalContent" style="display: none">
          <div class="modal-label">{{t.decryptedValueLabel}}</div>
          <div class="modal-value"><span id="modalValue"></span></div>
        </div>
        <div
          id="modalError"
          style="display: none; color: var(--danger); font-size: 0.8rem; padding: 1rem 0"
        >
        </div>
        <div class="modal-actions">
          <button class="btn-ghost" onclick="closeModal()">
            {{t.closeBtn}}
          </button>
          <button
            class="btn-accent"
            id="copyModalBtn"
            onclick="copyValue()"
            style="display: none"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="9" y="9" width="13" height="13" rx="2" />
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
            </svg>
            {{t.copyBtn}}
          </button>
        </div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div
      class="modal-overlay"
      id="editModal"
      onclick="if(event.target===this)closeEditModal()"
    >
      <div class="modal">
        <div class="modal-header">
          <h2>{{t.editTitle}}: <span id="editModalKeyName"></span></h2>
          <button class="btn-icon" onclick="closeEditModal()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="16"
              height="16"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
        <div class="form-group" style="margin-bottom: 0">
          <label class="form-label">{{t.editValueLabel}}</label>
          <input
            type="password"
            id="editNewValue"
            placeholder="{{t.editValuePlaceholder}}"
          />
        </div>
        <div class="modal-actions">
          <button class="btn-ghost" onclick="closeEditModal()">
            {{t.closeBtn}}
          </button>
          <button
            class="btn-accent"
            id="editUpdateBtn"
            onclick="updateSecret()"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"
              />
              <polyline points="17 21 17 13 7 13 7 21" />
              <polyline points="7 3 7 8 15 8" />
            </svg>
            {{t.updateBtn}}
          </button>
        </div>
      </div>
    </div>
    <script>
      let keys = [];
      let searchTerm = "";
      let isLoading = true;

      /* ── Theme ── */
      function setTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("lod-theme", theme);
        document.querySelectorAll(".theme-btn").forEach((b) => {
          b.classList.toggle(
            "active",
            b.getAttribute("data-theme-val") === theme,
          );
        });
      }
      (function initTheme() {
        const saved = localStorage.getItem("lod-theme") || "auto";
        setTheme(saved);
      })();

      /* ── Toast ── */
      function toast(msg, isError = false) {
        const c = document.getElementById("toastContainer");
        const el = document.createElement("div");
        el.className = "toast " + (isError ? "error" : "success");
        el.innerHTML =
          (isError
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>') +
          msg;
        c.appendChild(el);
        setTimeout(() => {
          el.classList.add("leaving");
          setTimeout(() => el.remove(), 250);
        }, 3000);
      }

      /* ── Data loading ── */
      async function loadKeys() {
        const btn = document.getElementById("refreshBtn");
        if (btn) btn.style.opacity = "0.5";
        try {
          const res = await fetch("/api/keys");
          const data = await res.json();
          keys = data.keys || [];
          document.getElementById("keyCount").textContent =
            keys.length + " {{t.keyCount}}";
          isLoading = false;
          renderKeys();
        } catch (err) {
          isLoading = false;
          console.error("Failed to load keys", err);
          renderKeys();
        }
        if (btn) btn.style.opacity = "1";
      }

      async function loadMasterKey() {
        try {
          const res = await fetch("/api/master-key");
          const data = await res.json();
          if (data.key) {
            document.getElementById("masterKey").value = data.key;
            document.getElementById("autoGenerateBtn").style.display =
              "none";
          }
        } catch (err) {
          console.error("Failed to load local master key", err);
        }
      }

      function checkMasterKeyInput() {
        const val = document.getElementById("masterKey").value.trim();
        document.getElementById("autoGenerateBtn").style.display =
          val.length > 0 ? "none" : "inline-flex";
      }

      function toggleKeyVisibility() {
        const inp = document.getElementById("masterKey");
        const isPassword = inp.type === "password";
        inp.type = isPassword ? "text" : "password";
        document.getElementById("eyeIcon").innerHTML = isPassword
          ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }

      async function generateKey() {
        try {
          const res = await fetch("/api/master-key", {
            method: "POST",
          });
          const data = await res.json();
          if (data.key) {
            document.getElementById("masterKey").value = data.key;
            document.getElementById("autoGenerateBtn").style.display =
              "none";
            toast("{{t.genSuccess}}");
          } else toast("Failed to generate key", true);
        } catch (err) {
          toast("Network error", true);
        }
      }

      async function addSecret() {
        const masterKey = document.getElementById("masterKey").value
          .trim();
        const key = document.getElementById("newKey").value.trim();
        const value = document.getElementById("newValue").value;
        if (!masterKey) {
          toast("{{t.masterKeyRequiredAdd}}", true);
          return;
        }
        if (masterKey.length !== 64) {
          toast("{{t.masterKeyInvalid}}", true);
          return;
        }
        if (!key || !value) {
          toast("{{t.bothRequired}}", true);
          return;
        }

        const btn = document.getElementById("storeBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> {{t.storing}}';
        try {
          const res = await fetch("/api/keys", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, value, masterKey }),
          });
          const data = await res.json();
          if (res.ok) {
            toast("{{t.storeSuccess}}");
            document.getElementById("newKey").value = "";
            document.getElementById("newValue").value = "";
            loadKeys();
          } else toast(data.error || "Failed", true);
        } catch (err) {
          toast("Network error", true);
        }
        btn.disabled = false;
        btn.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> {{t.storeSecretBtn}}';
      }

      function filterKeys() {
        searchTerm = document.getElementById("searchInput").value.trim()
          .toLowerCase();
        renderKeys();
      }

      function renderKeys() {
        const list = document.getElementById("keyList");

        if (isLoading) {
          list.innerHTML =
            '<li class="loading-state"><div class="skeleton"></div><div class="skeleton" style="width:85%"></div><div class="skeleton" style="width:70%"></div></li>';
          return;
        }

        const filtered = searchTerm
          ? keys.filter((k) => k.toLowerCase().includes(searchTerm))
          : keys;

        if (keys.length === 0) {
          list.innerHTML =
            '<li class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 9l10 13L22 9 12 2z"/></svg><p>{{t.noSecrets}}</p></li>';
          return;
        }
        if (filtered.length === 0) {
          list.innerHTML =
            '<li class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><p>{{t.noSearchResults}}</p></li>';
          return;
        }

        list.innerHTML = filtered.map((key) => `
                <li class="key-item">
                    <span class="key-name" title="${key}">${key}</span>
                    <div class="key-actions">
                        <button class="btn-icon" onclick="viewSecret('${key}')" title="{{t.viewBtn}}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                        <button class="btn-icon" onclick="editSecret('${key}')" title="{{t.editBtn}}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button class="btn-danger-sm" onclick="deleteSecret('${key}')">{{t.deleteBtn}}</button>
                    </div>
                </li>
            `).join("");
      }

      async function viewSecret(key) {
        const masterKey = document.getElementById("masterKey").value
          .trim();
        const modal = document.getElementById("decryptModal");
        document.getElementById("modalKeyName").textContent = key;
        document.getElementById("modalContent").style.display = "none";
        document.getElementById("modalError").style.display = "none";
        document.getElementById("modalLoading").style.display = "none";
        document.getElementById("copyModalBtn").style.display = "none";
        modal.classList.add("active");

        if (!masterKey) {
          document.getElementById("modalError").textContent =
            "{{t.masterKeyRequiredView}}";
          document.getElementById("modalError").style.display = "block";
          return;
        }

        document.getElementById("modalLoading").style.display = "block";
        try {
          const res = await fetch("/api/keys/decrypt", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, masterKey }),
          });
          const data = await res.json();
          document.getElementById("modalLoading").style.display =
            "none";
          if (res.ok) {
            document.getElementById("modalValue").textContent =
              data.value;
            document.getElementById("modalContent").style.display =
              "block";
            document.getElementById("copyModalBtn").style.display =
              "inline-flex";
          } else {
            document.getElementById("modalError").textContent =
              data.error || "Decryption failed";
            document.getElementById("modalError").style.display =
              "block";
          }
        } catch (err) {
          document.getElementById("modalLoading").style.display =
            "none";
          document.getElementById("modalError").textContent =
            "Network error";
          document.getElementById("modalError").style.display = "block";
        }
      }

      async function copyValue() {
        const val = document.getElementById("modalValue").textContent;
        try {
          await navigator.clipboard.writeText(val);
          const btn = document.getElementById("copyModalBtn");
          const orig = btn.innerHTML;
          btn.innerHTML =
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> {{t.copiedBtn}}';
          setTimeout(() => {
            btn.innerHTML = orig;
          }, 1500);
        } catch (e) {
          toast("Copy failed", true);
        }
      }

      async function deleteSecret(key) {
        if (!confirm(`{{t.deletePrompt}} "${key}"?`)) return;
        try {
          await fetch(`/api/keys/${encodeURIComponent(key)}`, {
            method: "DELETE",
          });
          toast(key + " deleted");
          loadKeys();
        } catch (err) {
          console.error("Failed to delete", err);
        }
      }

      let editingKey = "";
      function editSecret(key) {
        editingKey = key;
        document.getElementById("editModalKeyName").textContent = key;
        document.getElementById("editNewValue").value = "";
        document.getElementById("editModal").classList.add("active");
        setTimeout(
          () => document.getElementById("editNewValue").focus(),
          200,
        );
      }

      async function updateSecret() {
        const masterKey = document.getElementById("masterKey").value
          .trim();
        const value = document.getElementById("editNewValue").value;
        if (!masterKey) {
          toast("{{t.masterKeyRequiredAdd}}", true);
          return;
        }
        if (masterKey.length !== 64) {
          toast("{{t.masterKeyInvalid}}", true);
          return;
        }
        if (!value) {
          toast("{{t.bothRequired}}", true);
          return;
        }

        const btn = document.getElementById("editUpdateBtn");
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> {{t.updating}}';
        try {
          const res = await fetch("/api/keys", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key: editingKey, value, masterKey }),
          });
          const data = await res.json();
          if (res.ok) {
            toast("{{t.updateSuccess}}");
            closeEditModal();
            loadKeys();
          } else toast(data.error || "Failed", true);
        } catch (err) {
          toast("Network error", true);
        }
        btn.disabled = false;
        btn.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> {{t.updateBtn}}';
      }

      function closeModal() {
        document.getElementById("decryptModal").classList.remove(
          "active",
        );
      }
      function closeEditModal() {
        document.getElementById("editModal").classList.remove("active");
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeModal();
          closeEditModal();
        }
      });

      async function exportDataFile() {
        try {
          window.location.href = "/api/export";
        } catch (err) {
          toast("Export failed", true);
        }
      }

      async function importDataFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const confirmMerge = confirm("{{t.mergePrompt}}");
        const formData = new FormData();
        formData.append("file", file);
        formData.append("merge", confirmMerge);
        try {
          const res = await fetch("/api/import", {
            method: "POST",
            body: formData,
          });
          if (res.ok) {
            toast("{{t.importSuccess}}");
            loadKeys();
          } else {
            const data = await res.json();
            toast(data.error || "Import failed", true);
          }
        } catch (err) {
          toast("Network error", true);
        }
        event.target.value = "";
      }

      loadMasterKey();
      loadKeys();
    </script>
  </body>
</html>
